apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-serve
  labels:
    app: vllm-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-serve
  template:
    metadata:
      labels:
        app: vllm-serve
    spec:
      shareProcessNamespace: true
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - Qwen/Qwen2-7B-Instruct
            - --tensor-parallel-size
            - "2"
            - --enforce-eager
            - --gpu-memory-utilization
            - "0.80"
            - --max-model-len
            - "4096"
            - --port
            - "8000"
            - --disable-custom-all-reduce
          env:
            - name: CUDA_MODULE_LOADING
              value: "EAGER"
            - name: NCCL_NVLS_ENABLE
              value: "0"
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: VLLM_USE_V1
              value: "1"
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              nvidia.com/gpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30

        - name: checkpoint-sidecar
          image: vllm/vllm-openai:latest
          command:
            - /bin/bash
            - -c
            - |
              pip install cuda-checkpoint-vllm[vllm] && \
              cd /opt && git clone --depth 1 https://github.com/NVIDIA/cuda-checkpoint.git && \
              export PATH=/opt/cuda-checkpoint/bin/x86_64_Linux:$PATH && \
              vllm-ckpt watch --port 8000 --interval 300 --json
          env:
            - name: CUDA_MODULE_LOADING
              value: "EAGER"
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - kill -SIGTERM 1
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-serve
spec:
  selector:
    app: vllm-serve
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
